<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Rohan's Stats">
<title>Rohan's Worksheet Stats</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:system-ui,-apple-system,sans-serif;background:#F5F9FA;min-height:100vh;padding-bottom:60px}
button{cursor:pointer;font-family:inherit}
input{font-family:inherit}

.header{background:linear-gradient(135deg,#1B7A8A,#0F5F6E);padding:22px 16px 18px;text-align:center}
.header h1{font-size:20px;font-weight:900;color:#fff;margin-top:4px}
.header p{color:rgba(255,255,255,0.65);font-size:12px;margin-top:3px}

.wrap{max-width:780px;margin:0 auto;padding:14px 10px 0}

/* Pills */
.pills{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:12px}
.pill{background:#fff;border-radius:11px;box-shadow:0 2px 8px rgba(27,122,138,0.07);padding:9px 3px;text-align:center}
.pill .emoji{font-size:16px}
.pill .lbl{font-size:8px;font-weight:800;text-transform:uppercase;color:#A0AEC0;margin-top:1px}
.pill .val{font-size:17px;font-weight:900;margin:2px 0}
.pill .tr{font-size:9px;font-weight:700}

/* Tabs */
.tabs{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap}
.tab{padding:7px 12px;border-radius:8px;border:none;font-weight:800;font-size:12px;background:#fff;color:#4A5568;box-shadow:0 2px 6px rgba(27,122,138,0.08);transition:all 0.15s}
.tab.active{background:#1B7A8A;color:#fff}

/* Card */
.card{background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(27,122,138,0.09);padding:16px;margin-bottom:13px}
.card h2{font-size:13px;font-weight:900;color:#1B7A8A;margin-bottom:10px}

/* Banner */
.banner{background:linear-gradient(135deg,#E8A020,#F59E0B);border-radius:12px;padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;box-shadow:0 4px 12px rgba(232,160,32,0.2)}
.banner .icon{font-size:26px;flex-shrink:0}
.banner h3{font-weight:900;font-size:13px;color:#fff}
.banner p{font-size:10px;color:rgba(255,255,255,0.85);margin-top:2px}

/* Bar rows */
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.bar-lbl{width:100px;font-size:11px;font-weight:800}
.bar-track{flex:1;height:12px;background:#F0F4F8;border-radius:20px;overflow:hidden}
.bar-fill{height:100%;border-radius:20px;transition:width 0.5s}
.bar-pct{width:32px;text-align:right;font-size:12px;font-weight:900}

/* Table */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:11px}
th{font-size:9px;font-weight:800;text-transform:uppercase;color:#A0AEC0;padding:4px 5px;text-align:left;border-bottom:2px solid #F5F9FA}
td{padding:6px 5px;border-bottom:1px solid #F5F9FA;font-weight:700}
.badge{display:inline-block;padding:1px 6px;border-radius:20px;font-size:10px;font-weight:800}

/* Week accordion */
.week-card{background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(27,122,138,0.09);margin-bottom:13px;overflow:hidden}
.week-header{display:flex;align-items:center;gap:8px;padding:12px 14px;cursor:pointer;user-select:none}
.week-header:active{background:#F8FAFC}
.week-info{flex:1}
.week-title{font-weight:900;font-size:13px}
.week-subs{display:flex;gap:6px;margin-top:3px;flex-wrap:wrap}
.week-sub{font-size:9px;font-weight:800}
.week-right{text-align:right}
.week-arrow{color:#A0AEC0;font-size:12px;margin-left:2px}
.week-body{border-top:2px solid #F5F9FA;display:none}
.week-body.open{display:block}
.day-row{border-bottom:1px solid #F5F9FA;padding:9px 14px;display:flex;align-items:center;gap:6px}
.day-num{width:48px}
.day-num strong{font-size:12px;display:block}
.day-num span{font-size:8px;color:#A0AEC0}
.day-scores{flex:1;display:flex;gap:5px;flex-wrap:wrap}
.day-score{text-align:center;min-width:40px}
.day-score .s-emoji{font-size:8px;font-weight:800}
.day-score .s-val{font-size:11px;font-weight:900}
.day-score .s-pct{font-size:8px}
.del-btn{background:none;border:none;color:#CBD5E0;font-size:13px;padding:4px;margin-left:2px}
.week-total{padding:9px 14px;background:#F8FAFC;display:flex;align-items:center;gap:6px}
.wt-label{width:48px;font-weight:900;font-size:9px;color:#1B7A8A;line-height:1.4}

/* Chart */
.chart-wrap{position:relative;height:200px;margin-top:4px}

/* Form */
.form-card{background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(27,122,138,0.09);padding:16px;margin-bottom:13px;border-top:5px solid #E8A020}
.form-card h2{font-size:13px;font-weight:900;color:#1B7A8A;margin-bottom:12px}
.form-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:12px}
.form-scores{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:13px}
.fg label{font-size:9px;font-weight:800;text-transform:uppercase;color:#718096;display:block;margin-bottom:3px}
.fg input[type=text],.fg input[type=number]{width:100%;border:2px solid #E2E8F0;border-radius:8px;padding:7px 9px;font-size:13px;font-weight:700;outline:none;background:#F5F9FA}
.fg input:focus{border-color:#1B7A8A}
.score-lbl{font-size:9px;font-weight:800;text-transform:uppercase;display:block;margin-bottom:3px}
.score-inputs{display:flex;align-items:center;gap:2px}
.score-inputs input{width:40px;text-align:center;border:2px solid #E2E8F0;border-radius:7px;padding:6px 2px;font-size:13px;font-weight:700;outline:none;background:#F5F9FA}
.score-inputs input:focus{border-color:#1B7A8A}
.score-inputs span{color:#A0AEC0;font-weight:700;font-size:11px}
.save-btn{width:100%;padding:13px;background:linear-gradient(135deg,#1B7A8A,#0F5F6E);color:#fff;font-weight:900;font-size:15px;border:none;border-radius:10px;box-shadow:0 4px 12px rgba(27,122,138,0.28)}

/* Toast */
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(80px);background:#1A2332;color:#fff;padding:10px 18px;border-radius:40px;font-weight:700;font-size:13px;transition:transform 0.25s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

.hidden{display:none}
.stars{color:#E8A020}
</style>
</head>
<body>

<div class="header">
  <div style="font-size:30px">🏆</div>
  <h1>Rohan's Worksheet Stats</h1>
  <p>Day by day · Week by week</p>
</div>

<div class="wrap">
  <div class="pills" id="pills"></div>
  <div class="tabs" id="tabs"></div>
  <div id="content"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Data ─────────────────────────────────────────────────────────────────────
const STORE = 'rohan_v2';
const SUBS = [
  {key:'english',   label:'English',   emoji:'📝', color:'#2D6A9F', dt:3 },
  {key:'maths',     label:'Maths',     emoji:'🔢', color:'#E8560A', dt:16},
  {key:'fractions', label:'Fractions', emoji:'🍕', color:'#E8A020', dt:4 },
  {key:'shapes',    label:'Shapes',    emoji:'📐', color:'#8B5CF6', dt:2 },
  {key:'geo',       label:'Geo',       emoji:'🌍', color:'#27AE60', dt:2 },
];

function load() {
  try { return JSON.parse(localStorage.getItem(STORE)) || seed(); }
  catch { return seed(); }
}
function save(d) { localStorage.setItem(STORE, JSON.stringify(d)); }
function seed() {
  const d = [
    {id:1,week:1,day:1,date:'17/03',english:{got:2,tot:3}, maths:{got:15,tot:16},fractions:{got:4,tot:4},shapes:{got:2,tot:2},geo:{got:2,tot:2}},
    {id:2,week:1,day:2,date:'18/03',english:{got:2,tot:2}, maths:{got:12,tot:16},fractions:{got:3,tot:4},shapes:{got:2,tot:2},geo:{got:2,tot:2}},
  ];
  save(d); return d;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
const pct = (g,t) => t>0?Math.round(g/t*100):0;
const dPct = d => { const g=SUBS.reduce((a,s)=>a+d[s.key].got,0),t=SUBS.reduce((a,s)=>a+d[s.key].tot,0); return pct(g,t); };
const stars = p => '★'.repeat(p===100?5:p>=85?4:p>=70?3:p>=50?2:1)+'☆'.repeat(5-(p===100?5:p>=85?4:p>=70?3:p>=50?2:1));
const bdgStyle = p => p===100?'background:#DCFCE7;color:#166534':p>=85?'background:#DBEAFE;color:#1E40AF':p>=60?'background:#FEF3DC;color:#92400E':'background:#FEE2E2;color:#991B1B';

function rollup(dl) {
  const r={week:dl[0].week,days:dl.length};
  SUBS.forEach(s=>{r[s.key]={got:dl.reduce((a,d)=>a+d[s.key].got,0),tot:dl.reduce((a,d)=>a+d[s.key].tot,0)};});
  const g=SUBS.reduce((a,s)=>a+r[s.key].got,0),t=SUBS.reduce((a,s)=>a+r[s.key].tot,0);
  r.tp=pct(g,t); return r;
}
function byWeek(days) {
  const m={};
  days.forEach(d=>{if(!m[d.week])m[d.week]=[];m[d.week].push(d);});
  return Object.values(m).sort((a,b)=>a[0].week-b[0].week).map(rollup);
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2200);
}

// ── App State ─────────────────────────────────────────────────────────────────
let tab = 'overview';
let openWeek = null;
let chartInst = null;

const TABS = [['overview','🏠 Overview'],['weeks','📅 By Week'],['chart','📈 Chart'],['add','✏️ Log Day']];

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const days = load();
  const weeks = byWeek(days);
  const lw = weeks[weeks.length-1];
  const pw = weeks.length>1?weeks[weeks.length-2]:null;

  // Pills
  const pillsEl = document.getElementById('pills');
  if (lw) {
    pillsEl.innerHTML = SUBS.map(s => {
      const c=pct(lw[s.key].got,lw[s.key].tot), p2=pw?pct(pw[s.key].got,pw[s.key].tot):null, diff=p2!==null?c-p2:null;
      const trc = diff===null?'#A0AEC0':diff>0?'#27AE60':diff<0?'#E8560A':'#A0AEC0';
      const trt = diff===null?'—':diff>0?`▲${diff}%`:diff<0?`▼${Math.abs(diff)}%`:'▶';
      return `<div class="pill">
        <div class="emoji">${s.emoji}</div>
        <div class="lbl">${s.label}</div>
        <div class="val" style="color:${s.color}">${c}%</div>
        <div class="tr" style="color:${trc}">${trt}</div>
      </div>`;
    }).join('');
  } else { pillsEl.innerHTML = ''; }

  // Tabs
  document.getElementById('tabs').innerHTML = TABS.map(([t,l])=>
    `<button class="tab${tab===t?' active':''}" onclick="switchTab('${t}')">${l}</button>`
  ).join('');

  // Content
  const c = document.getElementById('content');
  if (tab==='overview')  c.innerHTML = renderOverview(days, weeks);
  if (tab==='weeks')     c.innerHTML = renderWeeks(days, weeks);
  if (tab==='chart')     { c.innerHTML = renderChartHTML(days, weeks); renderChart(days, weeks); }
  if (tab==='add')       c.innerHTML = renderAdd();
}

function renderOverview(days, weeks) {
  const best = weeks.length?weeks.reduce((b,w)=>w.tp>b.tp?w:b):{tp:0,week:'-'};
  const avg  = weeks.length?Math.round(weeks.reduce((s,w)=>s+w.tp,0)/weeks.length):0;

  const banner = weeks.length?`<div class="banner">
    <div class="icon">🏆</div>
    <div><h3>Best: Week ${best.week} — ${best.tp}%</h3><p>Avg ${avg}% · ${days.length} days · ${weeks.length} week${weeks.length!==1?'s':''}</p></div>
  </div>`:'';

  const bars = SUBS.map(s => {
    const a = days.length?Math.round(days.reduce((x,d)=>x+pct(d[s.key].got,d[s.key].tot),0)/days.length):0;
    return `<div class="bar-row">
      <div class="bar-lbl" style="color:${s.color}">${s.emoji} ${s.label}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${a}%;background:${s.color}"></div></div>
      <div class="bar-pct" style="color:${s.color}">${a}%</div>
    </div>`;
  }).join('');

  const recentRows = days.length===0
    ? '<tr><td colspan="8" style="text-align:center;color:#A0AEC0;padding:16px">No days yet!</td></tr>'
    : [...days].reverse().slice(0,7).map(d => {
        const tp=dPct(d);
        const cells = SUBS.map(s=>`<td>${d[s.key].got}/${d[s.key].tot}</td>`).join('');
        return `<tr>
          <td style="white-space:nowrap"><strong>W${d.week}D${d.day}</strong><br><span style="color:#A0AEC0;font-size:8px">${d.date}</span></td>
          ${cells}
          <td><span class="badge" style="${bdgStyle(tp)}">${tp}%</span></td>
          <td class="stars">${stars(tp)}</td>
        </tr>`;
      }).join('');

  return `${banner}
  <div class="card"><h2>🎯 Subject Averages</h2>${bars}</div>
  <div class="card"><h2>📋 Recent Days</h2>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Day</th>${SUBS.map(s=>`<th>${s.emoji}</th>`).join('')}<th>%</th><th>⭐</th></tr></thead>
      <tbody>${recentRows}</tbody>
    </table></div>
  </div>`;
}

function renderWeeks(days, weeks) {
  if (!weeks.length) return '<div class="card" style="text-align:center;color:#A0AEC0;padding:22px">No data yet!</div>';
  return weeks.map(w => {
    const isO = openWeek===w.week;
    const wd  = days.filter(d=>d.week===w.week).sort((a,b)=>a.day-b.day);
    const subSpans = SUBS.map(s=>`<span class="week-sub" style="color:${s.color}">${s.emoji}${pct(w[s.key].got,w[s.key].tot)}%</span>`).join('');

    const dayRows = wd.map(d => {
      const tp=dPct(d);
      const scores = SUBS.map(s => {
        const p=pct(d[s.key].got,d[s.key].tot);
        const vc=p===100?'#27AE60':p<75?'#E8560A':'#333';
        return `<div class="day-score">
          <div class="s-emoji" style="color:${s.color}">${s.emoji}</div>
          <div class="s-val" style="color:${vc}">${d[s.key].got}/${d[s.key].tot}</div>
          <div class="s-pct" style="color:${s.color}">${p}%</div>
        </div>`;
      }).join('');
      return `<div class="day-row">
        <div class="day-num"><strong>Day ${d.day}</strong><span>${d.date}</span></div>
        <div class="day-scores">${scores}</div>
        <span class="badge" style="${bdgStyle(tp)}">${tp}%</span>
        <span class="stars" style="font-size:9px;margin-left:3px">${stars(tp)}</span>
        <button class="del-btn" onclick="delDay(${d.id})">✕</button>
      </div>`;
    }).join('');

    const totScores = SUBS.map(s=>`<div class="day-score">
      <div class="s-emoji" style="color:${s.color}">${s.emoji}</div>
      <div class="s-val" style="color:${s.color}">${w[s.key].got}/${w[s.key].tot}</div>
      <div class="s-pct" style="color:${s.color}">${pct(w[s.key].got,w[s.key].tot)}%</div>
    </div>`).join('');

    return `<div class="week-card">
      <div class="week-header" onclick="toggleWeek(${w.week})">
        <span style="font-size:17px">📅</span>
        <div class="week-info">
          <div class="week-title">Week ${w.week} <span style="color:#A0AEC0;font-weight:600;font-size:10px">(${w.days} day${w.days!==1?'s':''})</span></div>
          <div class="week-subs">${subSpans}</div>
        </div>
        <div class="week-right">
          <span class="badge" style="${bdgStyle(w.tp)}">${w.tp}%</span>
          <div class="stars" style="font-size:11px;margin-top:2px">${stars(w.tp)}</div>
        </div>
        <span class="week-arrow">${isO?'▲':'▼'}</span>
      </div>
      <div class="week-body${isO?' open':''}">
        ${dayRows}
        <div class="week-total">
          <div class="wt-label">WEEK TOTAL</div>
          <div class="day-scores">${totScores}</div>
          <span class="badge" style="${bdgStyle(w.tp)}">${w.tp}%</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderChartHTML(days, weeks) {
  return `
  <div class="card"><h2>📈 Day-by-Day Progress</h2><div class="chart-wrap"><canvas id="chart-day"></canvas></div></div>
  ${weeks.length>=2?'<div class="card"><h2>📊 Week Rollup</h2><div class="chart-wrap"><canvas id="chart-week"></canvas></div></div>':''}`;
}

function renderChart(days, weeks) {
  if (chartInst) { chartInst.forEach(c=>c.destroy()); chartInst=null; }
  chartInst=[];

  if (days.length>=2) {
    const ctx=document.getElementById('chart-day').getContext('2d');
    chartInst.push(new Chart(ctx,{
      type:'line',
      data:{
        labels:days.map(d=>`W${d.week}D${d.day}`),
        datasets:SUBS.map(s=>({
          label:s.label, borderColor:s.color, backgroundColor:s.color+'18',
          data:days.map(d=>pct(d[s.key].got,d[s.key].tot)),
          borderWidth:2.5, pointRadius:4, tension:0.3, fill:false
        }))
      },
      options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
        plugins:{legend:{position:'bottom',labels:{font:{size:10,weight:'bold'},padding:10,usePointStyle:true}}},
        scales:{y:{min:0,max:100,ticks:{callback:v=>v+'%',font:{size:9,weight:'bold'}}},x:{ticks:{font:{size:9,weight:'bold'}},grid:{display:false}}}}
    }));
  }

  if (weeks.length>=2) {
    const ctx2=document.getElementById('chart-week').getContext('2d');
    chartInst.push(new Chart(ctx2,{
      type:'bar',
      data:{
        labels:weeks.map(w=>`Wk ${w.week}`),
        datasets:SUBS.map(s=>({
          label:s.label, backgroundColor:s.color,
          data:weeks.map(w=>pct(w[s.key].got,w[s.key].tot)),
          borderRadius:4
        }))
      },
      options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
        plugins:{legend:{position:'bottom',labels:{font:{size:10,weight:'bold'},padding:10,usePointStyle:true}}},
        scales:{y:{min:0,max:100,ticks:{callback:v=>v+'%',font:{size:9,weight:'bold'}}},x:{ticks:{font:{size:9,weight:'bold'}},grid:{display:false}}}}
    }));
  }
}

function renderAdd() {
  const scoreFields = SUBS.map(s=>`
    <div>
      <span class="score-lbl" style="color:${s.color}">${s.emoji} ${s.label}</span>
      <div class="score-inputs">
        <input type="number" min="0" placeholder="got" id="f-${s.key}-g">
        <span>/</span>
        <input type="number" min="0" id="f-${s.key}-t" value="${s.dt}">
      </div>
    </div>`).join('');

  return `<div class="form-card">
    <h2>✏️ Log a Day</h2>
    <div class="form-grid">
      <div class="fg"><label>Date</label><input type="text" id="f-date" placeholder="DD/MM/YYYY"></div>
      <div class="fg"><label>Week #</label><input type="number" id="f-week" min="1" placeholder="1"></div>
      <div class="fg"><label>Day #</label><input type="number" id="f-day" min="1" placeholder="1"></div>
    </div>
    <div class="form-scores">${scoreFields}</div>
    <button class="save-btn" onclick="saveDay()">➕ Save This Day</button>
  </div>`;
}

// ── Actions ───────────────────────────────────────────────────────────────────
function switchTab(t) { tab=t; render(); }
function toggleWeek(w) { openWeek = openWeek===w?null:w; render(); }
function delDay(id) {
  const d=load().filter(x=>x.id!==id); save(d); render(); toast('🗑️ Deleted');
}

function saveDay() {
  const date=document.getElementById('f-date').value.trim();
  const week=parseInt(document.getElementById('f-week').value);
  const day =parseInt(document.getElementById('f-day').value);
  if(!date||isNaN(week)||isNaN(day)){toast('⚠️ Fill in date, week & day');return;}
  for(const s of SUBS){
    if(document.getElementById(`f-${s.key}-g`).value===''){toast(`⚠️ Fill in ${s.label}`);return;}
  }
  const entry={id:Date.now(),week,day,date,
    ...Object.fromEntries(SUBS.map(s=>[s.key,{
      got:parseFloat(document.getElementById(`f-${s.key}-g`).value),
      tot:parseFloat(document.getElementById(`f-${s.key}-t`).value)
    }]))
  };
  const d=[...load(),entry].sort((a,b)=>a.week!==b.week?a.week-b.week:a.day-b.day);
  save(d);
  tab='weeks'; openWeek=week;
  render(); toast('🎉 Saved! Great work Rohan!');
}

// ── Boot ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
